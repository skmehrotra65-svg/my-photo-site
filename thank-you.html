<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message sent — Sanjay Mehrotra Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  body{
    background:#14140f; color:#ede8dc; font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; margin:0; padding:0 6vw;
  }
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:.78rem; letter-spacing:.16em; color:#c9a227; text-transform:uppercase; margin-bottom:18px;}

  p{color:#a39d8a; max-width:46ch; margin:0 0 34px; line-height:1.6;}
  a.home{
    font-family:'JetBrains Mono',monospace; font-size:.8rem; letter-spacing:.08em; text-transform:uppercase;
    color:#14140f; background:#c9a227; padding:14px 26px; border-radius:2px; text-decoration:none;
  }
</style>
</head>
<body>
  <div class="eyebrow">Received</div>
  <h1>Message sent.</h1>
  <p>Thanks for reaching out — I read every message and usually reply within a few days.</p>
  <a class="home" href="/">Back to the collection</a>

</html>
